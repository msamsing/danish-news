<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Danske nyheder - Home Assistant demo</title>
    <style>
      :root {
        --primary-color: #2f6f73;
        --primary-text-color: #20242a;
        --secondary-text-color: #66717e;
        --secondary-background-color: #f3f6f8;
        --divider-color: #d7dee5;
        --card-background-color: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: #e7edf0;
        color: var(--primary-text-color);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: 28px;
      }

      main {
        margin: 0 auto;
        max-width: 580px;
      }

      .demo-label {
        color: #52606d;
        font-size: 0.88rem;
        margin: 0 0 12px;
      }

      ha-card {
        border-radius: 8px;
        box-shadow: 0 18px 42px rgba(29, 43, 55, 0.16);
        display: block;
      }

      ha-icon {
        align-items: center;
        display: inline-flex;
        height: 24px;
        justify-content: center;
        width: 24px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="demo-label">Selvstændig demo med mock-data fra Home Assistant.</p>
      <danish-news-card></danish-news-card>
    </main>

    <script type="module">
      if (!customElements.get("ha-card")) {
        customElements.define("ha-card", class HaCard extends HTMLElement {});
      }

      if (!customElements.get("ha-icon")) {
        customElements.define("ha-icon", class HaIcon extends HTMLElement {
          static get observedAttributes() {
            return ["icon"];
          }

          connectedCallback() {
            this.render();
          }

          attributeChangedCallback() {
            this.render();
          }

          render() {
            this.textContent = iconFor(this.getAttribute("icon"));
          }
        });
      }

      await import("./danish-news-card.js");
      await customElements.whenDefined("danish-news-card");

      const now = new Date();
      const articles = [
        article({
          provider: "tv2",
          providerName: "TV 2",
          title: "Breaking: Nyt politisk udspil skal forenkle hverdagen for familier",
          summary: "Forslaget lægger op til færre digitale frister og tydeligere beskeder fra det offentlige.",
          category: "Samfund",
          minutesAgo: 9,
          breaking: true
        }),
        article({
          provider: "dr",
          providerName: "DR",
          title: "Kommuner tester ny varsling ved skybrud",
          summary: "Flere kommuner afprøver lokale advarsler, så borgerne hurtigere kan reagere ved voldsomt vejr.",
          category: "Indland",
          minutesAgo: 24
        }),
        article({
          provider: "eb",
          providerName: "Ekstra Bladet",
          title: "Pendlerne kan se frem til ændret køreplan",
          summary: "Trafikselskab lover kortere ventetid på udvalgte afgange efter sommerferien.",
          category: "Trafik",
          minutesAgo: 41
        }),
        article({
          provider: "bt",
          providerName: "B.T.",
          title: "Ekspert efterlyser mere åbenhed om nye regler",
          summary: "Flere organisationer beder om klarere vejledning, før reglerne træder i kraft.",
          category: "Politik",
          minutesAgo: 55
        }),
        article({
          provider: "dr",
          providerName: "DR",
          title: "Hospital udvider akuttelefon efter travl weekend",
          summary: "Regionen sætter ekstra personale på telefonerne for at nedbringe ventetiden.",
          category: "Sundhed",
          minutesAgo: 73
        })
      ];

      const card = document.querySelector("danish-news-card");
      card.setConfig({
        title: "Dagens nyheder",
        providers: ["tv2", "dr", "eb", "bt"],
        max_articles: 8,
        scale: 1,
        background_mode: "theme",
        frame_mode: "theme",
        show_summaries: true,
        show_source_link: false
      });

      card.hass = {
        states: {
          "sensor.nyheder": {
            state: String(articles.length),
            attributes: {
              integration: "danish_news",
              entry_id: "demo",
              updated_at: now.toISOString(),
              articles,
              provider_counts: countProviders(articles),
              provider_info: {}
            }
          }
        },
        callWS: async (message) => {
          const selected = articles.find((item) => item.id === message.article_id);
          await wait(350);
          return {
            ...selected,
            byline: "Demo-redaktionen",
            body: [
              "Dette er den interne artikelvisning. I den rigtige Home Assistant-integration henter backenden den offentligt tilgængelige artikelside og udtrækker et læsbart tekstudsnit.",
              "Kortet bliver på dashboardet, så man kan læse overskriften, skifte til artiklen og gå tilbage til dagens overblik uden at åbne nyhedssiden i en ny fane.",
              "Hvis backenden vurderer, at artiklen er bag betalingsmur, bliver artiklen ikke vist i denne læsevisning."
            ],
            paywalled: false
          };
        },
        callService: () => undefined
      };

      function article({ provider, providerName, title, summary, category, minutesAgo, breaking = false }) {
        const published = new Date(now.getTime() - minutesAgo * 60 * 1000).toISOString();
        return {
          id: `${provider}-${slug(title)}`,
          provider,
          provider_name: providerName,
          title,
          summary,
          url: `https://example.com/${provider}/${slug(title)}`,
          published,
          category,
          image: "",
          paywalled: false,
          breaking
        };
      }

      function countProviders(items) {
        return items.reduce((counts, item) => {
          counts[item.provider] = (counts[item.provider] || 0) + 1;
          return counts;
        }, {});
      }

      function slug(value) {
        return value
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "");
      }

      function wait(ms) {
        return new Promise((resolve) => window.setTimeout(resolve, ms));
      }

      function iconFor(icon) {
        const icons = {
          "mdi:arrow-left": "←",
          "mdi:information-outline": "i",
          "mdi:loading": "↻",
          "mdi:newspaper-variant-outline": "▤",
          "mdi:refresh": "↻"
        };

        return icons[icon] || "•";
      }
    </script>
  </body>
</html>
